# コピー先: ~/.config/aibe/config.toml
# 実キーはリポジトリにコミットしないこと。

# socket_path = "~/.local/share/aibe/run.sock"

[llm]
# provider = "mock"
provider = "openai_compatible"
api_key = "YOUR_API_KEY"
base_url = "http://127.0.0.1:1234/v1"
model = "local-model"

# Gemini（Google AI Studio）— docs/0010_gemini-provider-spec.md
# provider = "gemini"
# api_key = "YOUR_API_KEY"
# model = "gemini-3.5-flash"
# base_url = "https://generativelanguage.googleapis.com/v1beta"

[tools]
# 1 以上（0 は読み込みエラー）。1 agent_turn あたりの LLM↔tool ループ上限。
max_rounds = 8
exec_timeout_ms = 30_000
# tool_calls / LLM 向け tool result の最大バイト（既定 32768、256〜1048576 にクランプ）
max_tool_output_bytes = 32_768

[tools.shell_exec]
enabled = true
# ベース名（例: git）または絶対パス。空リストのときは常に拒否。
allowed_commands = ["ls", "git", "cargo", "echo"]

[tools.read_file]
# 読取可能ルート。`~` はホーム展開。
allowed_roots = [".", "~/projects"]
