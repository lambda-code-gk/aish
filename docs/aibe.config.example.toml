# コピー先: ~/.config/aibe/config.toml
# 実キーはリポジトリにコミットしないこと。

# socket_path = "~/.local/share/aibe/run.sock"

default_profile = "fast"

# --- LLM 接続定義（認証・エンドポイントのみ）---

[llm.gemini-studio]
provider = "gemini"
api_key = "YOUR_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"

[llm.lmstudio]
provider = "openai_compatible"
api_key = "YOUR_API_KEY"
base_url = "http://127.0.0.1:1234/v1"

# [llm.mock]
# provider = "mock"

# --- プロファイル（モデル・生成パラメータ）---

[profiles.fast]
llm = "gemini-studio"
model = "gemini-3.5-flash"

[profiles.local]
llm = "lmstudio"
model = "local-model"
temperature = 0.7

# --- 後方互換: フラット [llm] のみ（暗黙 default / default）---
# [llm]
# provider = "openai_compatible"
# api_key = "YOUR_API_KEY"
# base_url = "http://127.0.0.1:1234/v1"
# model = "local-model"

[tools]
max_rounds = 8
exec_timeout_ms = 30_000
max_tool_output_bytes = 32_768

[tools.shell_exec]
enabled = true
allowed_commands = ["ls", "git", "cargo", "echo"]

[tools.read_file]
allowed_roots = [".", "~/projects"]
