# コピー先: ~/.config/aibe/config.toml
# 実キーはリポジトリにコミットしないこと。

# socket_path = "~/.local/share/aibe/run.sock"

default_profile = "fast"

# 外部コマンド（0026 設計: docs/spec/0026_external-commands-spec.md）:
# Codex CLI / Claude Code CLI を shell_exec のプリセットとして登録する案。
# - 0024 の cli_subagents は非採用
# - first-class tool / LlmProvider / invoke_* / artifacts / 自動 resume は導入しない
# - command は [tools.shell_exec].allowed_commands に含める
# - 詳細な検証手順は docs/manual/external-commands-cli.md を追加する想定
#
# [[external_commands]]
# name = "codex"
# description = "Codex CLI を外部コマンドとして呼ぶ"
# command = "codex"
# args = ["exec", "--json", "-C", "{cwd}", "{prompt}"]
# timeout_secs = 1800
#
# [[external_commands]]
# name = "claude"
# description = "Claude Code CLI を外部コマンドとして呼ぶ"
# command = "claude"
# args = ["-p", "{prompt}", "--output-format", "json"]
# timeout_secs = 1800

# --- LLM 接続定義（認証・エンドポイントのみ）---

[router]
# smart entry の route_turn で使う軽量分類用 profile
profile = "fast"

[llm.gemini-studio]
provider = "gemini"
api_key = "YOUR_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"

[llm.lmstudio]
provider = "openai_compatible"
api_key = "YOUR_API_KEY"
base_url = "http://127.0.0.1:1234/v1"

# OpenAI 公式 API も provider = "openai_compatible"（base_url 省略で https://api.openai.com/v1）
# [llm.openai]
# provider = "openai_compatible"
# api_key = "YOUR_API_KEY"

# [llm.mock]
# provider = "mock"

# --- プロファイル（モデル・生成パラメータ）---

[profiles.fast]
llm = "gemini-studio"
model = "gemini-3.5-flash"

[profiles.local]
llm = "lmstudio"
model = "local-model"
temperature = 0.7

# --- 外部コマンドの起動に使う既存の shell_exec 設定 ---
#
# 外部コマンドは @exec / literal shell_exec からのみ呼ぶ。
# `allowed_commands` に `codex` / `claude` やラッパースクリプト名を追加する。

# --- 後方互換: フラット [llm] のみ（暗黙 default / default）---
# [llm]
# provider = "openai_compatible"
# api_key = "YOUR_API_KEY"
# base_url = "http://127.0.0.1:1234/v1"
# model = "local-model"

[tools]
max_rounds = 8
exec_timeout_ms = 30_000
max_tool_output_bytes = 32_768

# contextual memory を無効化して basic ランタイムにする（0038 Phase A + 0043）
# [memory]
# enabled = false
# enabled=false では smart feature registry も empty（baseline features.toml は読まない）
# generic memory のみ使う例（AISH kind / recipe / feature を明示的に無効化）:
# kind_files = []
# recipe_files = []
# feature_files = []
# feature 未指定（None）でも generic memory では baseline feature は読まない（0043 Phase 3: composition root が empty に解決）
# 環境変数 AIBE_MEMORY_ENABLED=0 でも無効化可。ai 側は ~/.config/ai/config.toml の [memory] も合わせること。

[tools.shell_exec]
enabled = true
allowed_commands = ["ls", "git", "cargo", "echo"]
# 外部コマンドを使うなら、ここに `codex` / `claude` / ラッパースクリプト名を追加する
# shell_exec_approval = "ask"   # never | ask | always（既定 ask）

# session 許可後のみ評価。destructive tier には適用しない（0036）。
[tools.shell_exec.auto_approve_patterns]
read_only = ["^git status$", "^git diff$"]
mutating = ["^cargo test$", "^cargo check$"]

[tools.read_file]
allowed_roots = [".", "~/projects"]

# list_dir / grep の探索上限（timeout 前のメモリ・I/O 抑制）
[tools.explore]
max_list_entries = 10_000
max_grep_files_scanned = 5_000
max_grep_matches = 5_000
max_grep_file_bytes = 1_048_576

# conversation store の既定は `~/.local/share/aibe/conversations`
# conversation_store_root = "~/.local/share/aibe/conversations"
