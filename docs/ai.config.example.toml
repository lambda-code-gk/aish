# コピー先: ~/.config/ai/config.toml

socket_path = "~/.local/share/aibe/run.sock"
history_dir = "~/.local/share/ai/history"
# ローカル history の最大件数。超過分は古い index / payload から削除。0 で GC 無効。
history_max_entries = 500
log_tail_bytes = 16384
# AI_SESSION_ID は smart entry が起動時に環境変数から解決する。ここには設定しない。

# contextual memory を無効化（basic ai）。aibe 側 config も合わせること（0038 Phase A）
# [memory]
# enabled = false
# 環境変数 AI_MEMORY_ENABLED=0 でも無効化可

[ask]
# 文字列でも配列でもよい。CLI --tools があれば上書き（--tools none でこの回のみ []）。
# キー省略時の既定は []。以下は安全側の例（docs/done/0002_ai-tools-client-spec.md）。
tools = "@read-only"
# TTY 向け console hint（端末サイズに応じた system instruction）。省略時 true。
# CLI: --console-hint / -H で有効、--no-console-hint / -N で無効。
# console_hints = false
# 進行表示（TTY stderr では省略時 true）。CLI: --progress / --no-progress。
# progress = false
# assistant 本文を /bin/sh -c で加工（例: jq 整形）。非空 AI_FILTER があれば上書き。
# filter = "jq ."

[presets.fast]
tools = "@read-only"
profile = "fast"
filter = "cat"
log_tail_bytes = 4096
quiet = true
# console_hints = false
# shell_exec_approval = "never"

# Smart Preprocessor（0044）— 既定は無効。有効化時は shadow から始めることを推奨。
