name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
      - name: Install zsh (0055 zsh_supported_in_ci)
        run: sudo apt-get update && sudo apt-get install -y zsh
      - run: cargo metadata --locked --format-version 1 > /dev/null
      - run: ./scripts/verify.sh
        env:
          VERIFY_PARALLEL: "1"
          FEATURE_SCOPE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '') }}

  smoke-mock:
    name: smoke-mock
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          save-if: "false"
      - run: ./scripts/smoke-mock.sh

  feature-off:
    name: feature-off
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "feature-off"
          cache-on-failure: true
      - run: cargo build --workspace --no-default-features
      - run: cargo test --workspace --no-default-features -j 4 -- --test-threads=1
