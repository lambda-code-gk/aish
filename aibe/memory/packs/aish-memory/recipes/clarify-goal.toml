id = "clarify-goal"
description = "Turn open ideas into a clarified goal set"
llm_profile = "default"
prompt_md = "clarify-goal.md"

[[materials]]
name = "open_query"
title = "Open ideas"
kind = "idea"
scope = "project"
status = "open"

[[materials]]
name = "goal_query"
title = "Active goal"
kind = "goal"
scope = "project"
status = "active"
active_only = true
limit = 1

[[materials]]
name = "now_query"
title = "Active now"
kind = "now"
scope = "session"
status = "active"
active_only = true
limit = 1

[[materials]]
name = "rule_query"
title = "Active rules"
kind = "rule"
scope = "project"
status = "active"
active_only = true

[[materials]]
name = "decision_query"
title = "Active decisions"
kind = "decision"
scope = "project"
status = "active"
active_only = true

[output]
format = "json"
summary_required = true
allow_operations = ["add"]
